# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (SUPABASE POSTGRES)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# CLOUDINARY CONFIG
# ===============================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# ===============================
# GROQ AI CONFIG
# ===============================
groq.api.key=${GROQ_KEY}
jina.api.key=${JINA_KEY}

# ===============================
# FIREBASE CONFIG
# ===============================
firebase.config=${FIREBASE_CONFIG}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.Ecommerce=DEBUG

# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
